<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- zoom handled by JS -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Library">
<title>My Library</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500&display=swap');
:root {
--ink:#0f0e11;--ink2:#1a1820;--ink3:#26232e;--border:#332f3d;
--amber:#c8903a;--amber-dim:#8a5f20;--amber-glow:#fbbf60;
--text:#e8e0d0;--text-dim:#9e96a8;--blood2:#c0392b;
/* per-series accent — overridden by JS when entering a series */
--accent:var(--blood2);--accent-dim:#8b1a1a;--accent-glow:#e05050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#000;overscroll-behavior:none;color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;background:#000}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--ink2);border-bottom:1px solid var(--border);flex-shrink:0}
#topbar-logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--accent);letter-spacing:.04em;flex:1;text-shadow:0 0 20px rgba(192,57,43,.4)}
#topbar-logo span{color:var(--amber);font-style:italic;font-size:.75rem;font-weight:400;display:block;letter-spacing:.1em;margin-top:-2px}
.icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.icon-btn:active{color:var(--amber);background:var(--ink3)}
.icon-btn svg{width:20px;height:20px}

/* VIEWS */
.view{flex:1;overflow:hidden;display:none;flex-direction:column}
.view.active{display:flex}

/* ── SERIES HOME ──────────────────────────────────────────────── */
#series-scroll{flex:1;overflow-y:auto;padding:24px 16px 80px}
#series-scroll::-webkit-scrollbar{width:3px}
#series-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.series-label{font-size:.62rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin:0 0 16px 2px}
.series-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px;margin:0 auto}
.series-card{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.series-card:active{transform:scale(.96)}
.series-bg{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;background:var(--ink3)}
.series-bg-img{width:100%;height:100%;object-fit:cover;display:block}
.series-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,14,.97) 0%,rgba(10,8,14,.5) 50%,transparent 100%)}
.series-info{position:relative;z-index:2;padding:14px 12px 16px}
.series-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);line-height:1.2}
.series-sub{font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.series-count{display:inline-block;margin-top:8px;font-size:.62rem;font-weight:500;letter-spacing:.08em;padding:3px 8px;border-radius:20px;background:rgba(200,144,58,.2);color:var(--amber);border:1px solid rgba(200,144,58,.3)}

/* Series card — "currently reading" pill */
.series-reading-badge{position:absolute;top:10px;right:10px;z-index:4;font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:rgba(15,14,17,.75);color:var(--amber-glow);border:1px solid rgba(200,144,58,.5);backdrop-filter:blur(4px);line-height:1.4}

/* Featured book card — the one you're furthest into gets a full-width slot */
.book-card.featured{grid-column:1/-1;flex-direction:row;border-radius:6px}
.book-card.featured .book-cover{height:140px;width:100px;flex-shrink:0}
.book-card.featured .book-meta{flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 14px;background:var(--ink3)}
.book-card.featured .book-meta-name{font-size:.82rem;color:var(--text);white-space:normal;line-height:1.35;margin-bottom:4px;font-family:'Playfair Display',serif;font-style:italic}
.book-card.featured .book-meta-label{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
.book-card.featured .book-progress-bar{height:3px;margin-top:8px}
.book-card.featured .book-pct-text{font-size:.65rem;color:var(--text-dim);margin-top:5px}

/* LIBRARY */
#library-scroll{flex:1;overflow-y:auto;padding:16px 14px 80px}
#library-scroll::-webkit-scrollbar{width:3px}
#library-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#library-inner{max-width:900px;margin:0 auto}
.section-label{font-size:.62rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin:0 0 14px 2px}
#book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
.book-card{display:flex;flex-direction:column;cursor:pointer;border-radius:4px;overflow:hidden;transition:transform .15s;user-select:none}
.book-card:active{transform:scale(.95)}
.book-cover{height:175px;position:relative;overflow:hidden;flex-shrink:0}
.cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:2}
.cover-spine{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px 11px;z-index:1}
.cover-spine::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(130deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)}
.cover-spine::after{content:'';position:absolute;inset:0;background:linear-gradient(150deg,rgba(255,255,255,.1) 0%,transparent 55%)}
.spine-inner{position:relative;z-index:1}
.book-num{font-size:.6rem;font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:3px}
.book-title-spine{font-family:'Playfair Display',serif;font-size:.75rem;font-weight:700;line-height:1.25;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.bookmark-dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--amber-glow);box-shadow:0 0 8px var(--amber);z-index:6}
.novella-flag{position:absolute;top:0;left:0;background:rgba(200,144,58,.85);color:#0f0e11;font-size:.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:0 0 4px 0;z-index:6}
.book-meta{background:var(--ink3);padding:7px 9px 8px;flex-shrink:0}
.book-meta-name{font-size:.7rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-progress-bar{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden}
.book-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .4s}

/* READER */
#view-reader{background:#000 !important}
#reader-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#000;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;min-height:52px;transition:transform .28s ease,opacity .28s ease;position:relative;z-index:30}
#reader-title{flex:1;font-size:.82rem;font-family:'Playfair Display',serif;font-style:italic;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#reader-page-info{font-size:.72rem;color:var(--text-dim);white-space:nowrap;flex-shrink:0}
#reader-content{flex:1;position:relative;overflow:hidden;background:#fff}
.page-slot{position:absolute;top:-1px;left:0;right:0;bottom:-1px;display:flex;align-items:center;justify-content:center;background:#fff;transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform}
.page-slot canvas{display:block;max-width:100%;max-height:100%;background:transparent}

/* Tint filters — only on #reader-content so topbar/nav stay black.
   Each filter is tuned so its result on a white background looks natural:
   night  : invert(white)=black  ✓ already correct
   sepia  : sepia(white)=warm parchment ✓
   warm   : slight sepia+saturate on white ✓
   cool   : hue-rotate+desaturate on white ✓
   hicon  : contrast boost on white ✓
   green  : sepia+hue-rotate on white ✓
   Nav gradient uses matching color per tint so it blends seamlessly. */
.tint-sepia #reader-content{filter:sepia(.7) brightness(.95)}
.tint-warm  #reader-content{filter:sepia(.3) saturate(1.2) brightness(1.02)}
.tint-night #reader-content{filter:invert(1) hue-rotate(180deg) brightness(.85)}
.tint-cool  #reader-content{filter:hue-rotate(20deg) brightness(.9) saturate(.8)}
.tint-hicon #reader-content{filter:contrast(1.3) brightness(1.05)}
.tint-green #reader-content{filter:sepia(.4) hue-rotate(90deg) brightness(.9)}

/* Nav gradient end-color must match the filtered background so it blends in.
   Default (normal): white. night: white (inverts to black). Others: white
   since their filters produce a warm/cool tint from white automatically. */
#reader-nav{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,#fff 45%);padding:24px 14px 14px;display:flex;align-items:center;gap:8px;z-index:20;transition:transform .28s ease,opacity .28s ease}
.nav-btn{background:rgba(38,35,46,.92);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:5px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nav-btn:active{background:var(--border)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-btn.lock-on{border-color:var(--amber-dim);background:rgba(200,144,58,.12);color:var(--amber)}
#reader-progress-wrap{flex:1;padding:0 2px}
#reader-progress{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.2);cursor:pointer;outline:none}
#reader-progress::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 8px rgba(200,144,58,.5)}
#view-reader.immersive #reader-topbar{transform:translateY(-100%);opacity:0;pointer-events:none}
#view-reader.immersive #reader-nav{transform:translateY(100%);opacity:0;pointer-events:none}

/* SHIMMER SKELETON for series mosaic tiles while covers load */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.series-bg-shimmer{
  width:100%;height:100%;
  background:linear-gradient(90deg,var(--ink3) 25%,var(--ink2) 50%,var(--ink3) 75%);
  background-size:400px 100%;
  animation:shimmer 1.4s ease-in-out infinite;
}

/* TINT PICKER */
#tint-panel{position:fixed;bottom:0;left:0;right:0;background:var(--ink2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px 16px 34px;z-index:500;transform:translateY(100%);transition:transform .28s ease}
#tint-panel.open{transform:translateY(0)}
#tint-panel h3{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.tint-grid{display:flex;flex-wrap:wrap;gap:10px}
.tint-btn{display:flex;align-items:center;gap:8px;background:var(--ink3);border:1.5px solid var(--border);color:var(--text);font-size:.8rem;font-family:'Inter',sans-serif;padding:9px 14px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tint-btn.active{border-color:var(--amber);color:var(--amber-glow);background:rgba(200,144,58,.1)}
.tint-swatch{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
#tint-overlay{position:fixed;inset:0;z-index:499;display:none;background:rgba(0,0,0,.5)}
#tint-overlay.open{display:block}

/* TTS PANEL */
#tts-overlay{position:fixed;inset:0;z-index:499;display:none;background:rgba(0,0,0,.55)}
#tts-overlay.open{display:block}
#tts-panel{position:fixed;bottom:0;left:0;right:0;background:var(--ink2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px 16px 34px;z-index:500;transform:translateY(100%);transition:transform .28s ease;max-height:74vh;display:flex;flex-direction:column;overflow:hidden}
#tts-panel.open{transform:translateY(0)}
#tts-panel h3{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;flex-shrink:0}
.tts-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-shrink:0}
#tts-play-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink3);border:1.5px solid var(--amber-dim);color:var(--amber-glow);font-size:.82rem;font-family:'Inter',sans-serif;padding:11px 16px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,border-color .15s}
#tts-play-btn.playing{background:rgba(200,144,58,.15);border-color:var(--amber)}
#tts-stop-btn{display:flex;align-items:center;justify-content:center;background:var(--ink3);border:1.5px solid var(--border);color:var(--text-dim);padding:11px 13px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
#tts-stop-btn:active{background:var(--border)}
.tts-speed-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-shrink:0}
.tts-speed-label{font-size:.7rem;color:var(--text-dim);white-space:nowrap;min-width:38px}
#tts-rate{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.15);cursor:pointer;outline:none}
#tts-rate::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 8px rgba(200,144,58,.4)}
.tts-speed-val{font-size:.72rem;color:var(--amber-glow);min-width:32px;font-variant-numeric:tabular-nums}
.tts-voice-section{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
#tts-voice-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px}
#tts-voice-list::-webkit-scrollbar{width:3px}
#tts-voice-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tts-voice-btn{display:flex;align-items:center;justify-content:space-between;background:var(--ink3);border:1.5px solid var(--border);color:var(--text);font-size:.78rem;font-family:'Inter',sans-serif;padding:9px 12px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:left;width:100%;flex-shrink:0}
.tts-voice-btn.active{border-color:var(--amber);color:var(--amber-glow);background:rgba(200,144,58,.1)}
.tts-voice-lang{font-size:.6rem;color:var(--text-dim);letter-spacing:.06em;flex-shrink:0;margin-left:8px}
#tts-anim{display:inline-flex;align-items:flex-end;gap:2px;height:14px}
#tts-anim span{display:block;width:3px;border-radius:2px;background:var(--amber-glow);height:4px;transition:height .1s}
#tts-anim.on span{animation:ttswave .75s ease-in-out infinite}
#tts-anim.on span:nth-child(2){animation-delay:.18s}
#tts-anim.on span:nth-child(3){animation-delay:.36s}
@keyframes ttswave{0%,100%{height:4px}50%{height:13px}}

/* LOADING */
#loading{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50}
#loading.hidden{display:none}
.spinner{width:38px;height:38px;border:3px solid #333;border-top-color:var(--blood2);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-label{color:var(--text-dim);font-size:.82rem;text-align:center;max-width:260px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink3);border:1px solid var(--amber-dim);color:var(--text);padding:9px 16px;border-radius:8px;font-size:.78rem;white-space:nowrap;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:600}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CTX MENU */
#ctx-menu{position:fixed;background:var(--ink3);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:300;min-width:170px;display:none}
.ctx-item{padding:13px 16px;cursor:pointer;font-size:.84rem;color:var(--text);display:flex;align-items:center;gap:10px;transition:background .1s}
.ctx-item:active{background:var(--border)}
.ctx-item.muted{color:var(--text-dim);opacity:.5;pointer-events:none}
.ctx-divider{height:1px;background:var(--border)}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="topbar-logo"><span id="topbar-title">MY LIBRARY</span> <span id="topbar-sub"></span></div>
    <button class="icon-btn" id="sort-btn" aria-label="Sort" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
    </button>
  </div>

  <!-- ── SERIES HOME ── -->
  <div class="view active" id="view-series">
    <div id="series-scroll">
      <p class="series-label">Your Library</p>
      <div class="series-grid" id="series-grid"></div>
    </div>
  </div>

  <!-- ── LIBRARY ── -->
  <div class="view" id="view-library">
    <div id="library-scroll">
      <div id="library-inner">
        <p class="section-label" id="library-label">Complete Series</p>
        <div id="book-grid"></div>
      </div>
    </div>
  </div>

  <!-- ── READER ── -->
  <div class="view" id="view-reader">
    <div id="reader-topbar">
      <button class="icon-btn" id="back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="reader-title">—</span>
      <button class="icon-btn" id="tint-btn" aria-label="Page colour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a5 5 0 0 0-5 5c0 5 5 10 5 10s5-5 5-10a5 5 0 0 0-5-5z"/><circle cx="12" cy="7" r="1.5" fill="currentColor"/></svg>
      </button>
      <button class="icon-btn" id="tts-btn" aria-label="Read aloud">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
      <button class="icon-btn" id="bookmark-btn" aria-label="Bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="bm-icon">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <span id="reader-page-info">— / —</span>
    </div>
    <div id="reader-content">
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loading-label">Loading…</p>
      </div>
      <div id="reader-nav">
        <button class="nav-btn" id="prev-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Prev
        </button>
        <div id="reader-progress-wrap">
          <input type="range" id="reader-progress" min="1" max="100" value="1">
        </div>
        <button class="nav-btn" id="next-btn">
          Next<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="nav-btn" id="scroll-lock-btn" title="Scroll Lock">
          <svg id="lock-icon-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <svg id="lock-icon-on" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" style="display:none"><rect x="3" y="11" width="18" height="11" rx="2" fill="rgba(200,144,58,.2)"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><line x1="12" y1="15" x2="12" y2="18" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<div id="toast"></div>
<div id="tint-overlay"></div>
<div id="tint-panel">
  <h3>Page Colour</h3>
  <div class="tint-grid" id="tint-grid"></div>
</div>
<div id="tts-overlay"></div>
<div id="tts-panel">
  <h3>Read Aloud</h3>
  <div class="tts-controls">
    <button id="tts-play-btn">
      <svg id="tts-play-icon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span id="tts-play-label">Play Page</span>
      <div id="tts-anim"><span></span><span></span><span></span></div>

function getSeriesReadingInfo(s) {
  // Returns {currentBookTitle} for the series card "currently reading" badge
  try {
    const raw = localStorage.getItem(s.storeKey);
    if (!raw) return {currentBookTitle:null};
    const data = JSON.parse(raw);
    const progress  = data.progress  || {};
    const totals    = data.totals    || {};
    const bookmarks = data.bookmarks || {};
    let bestId = null, bestPage = 0;
    // Priority: bookmarked book first
    const bmIds = Object.keys(bookmarks);
    if (bmIds.length) bestId = bmIds[0];
    // Otherwise highest progress that isn't 100% finished
    if (!bestId) {
      s.catalogue.forEach(b => {
        const pg  = progress[b.id] || 0;
        const tot = totals[b.id]   || 0;
        const pct = tot ? pg / tot : 0;
        if (pg > bestPage && pct < 0.99) { bestPage = pg; bestId = b.id; }
      });
    }
    const currentBookTitle = bestId ? (s.catalogue.find(b => b.id === bestId) || {}).title || null : null;
    return {currentBookTitle};
  } catch(e) { return {currentBookTitle:null}; }
}

// ─── LIBRARY ──────────────────────────────────────────────────────
function renderLibrary() {
  const grid = document.getElementById('book-grid');
  grid.innerHTML = '';
  const catalogue = currentSeries.catalogue;
  const list = sortAlpha ? [...catalogue].sort((a,b) => a.title.localeCompare(b.title)) : catalogue;

  // Find the "featured" book — bookmarked one, else furthest in-progress book (not 100% done)
  let featuredId = null;
  const bmKeys = Object.keys(state.bookmarks);
  if (bmKeys.length) {
    featuredId = bmKeys[0];
  } else {
    let bestPct = 0;
    catalogue.forEach(b => {
      const pg = state.progress[b.id] || 0;
      const tot = state.totals[b.id] || 0;
      const pct = tot ? pg / tot : 0;
      if (pg > 0 && pct < 0.99 && pct > bestPct) { bestPct = pct; featuredId = b.id; }
    });
  }

  list.forEach(book => {
    const [c1,c2] = currentSeries.spineColors[parseInt(book.id)-1] || currentSeries.spineColors[0];
    const hasBm = state.bookmarks[book.id] != null;
    const prog  = state.progress[book.id] || 0;
    const total = state.totals[book.id] || 0;
    const pct   = total ? Math.min(100, Math.round(prog/total*100)) : 0;

    const covers = window[currentSeries.coversVar];
    const coverUrl = (covers && covers[book.id]) || '';

    const isFeatured = !sortAlpha && book.id === featuredId && pct > 0;

    const card = document.createElement('div');
    card.className = 'book-card' + (isFeatured ? ' featured' : '');
    card.dataset.id = book.id;

    if (isFeatured) {
      card.innerHTML = `
        <div class="book-cover" style="background:linear-gradient(155deg,${c1},${c2})">
          ${coverUrl ? `<img class="cover-img" src="${coverUrl}" alt="" loading="lazy">` : ''}
          <div class="cover-spine">
            <div class="spine-inner">
              <div class="book-num">Book ${book.num}</div>
              <div class="book-title-spine">${book.title}</div>
            </div>
          </div>
          ${book.novella ? '<div class="novella-flag">Novella</div>' : ''}
          ${hasBm ? '<div class="bookmark-dot"></div>' : ''}
        </div>
        <div class="book-meta">
          <div class="book-meta-label">Currently Reading</div>
          <div class="book-meta-name">${book.title}</div>
          <div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div>
          <div class="book-pct-text">${pct}% complete</div>
        </div>`;
    } else {
      card.innerHTML = `
        <div class="book-cover" style="background:linear-gradient(155deg,${c1},${c2})">
          ${coverUrl ? `<img class="cover-img" src="${coverUrl}" alt="" loading="lazy">` : ''}
          <div class="cover-spine">
            <div class="spine-inner">
              <div class="book-num">Book ${book.num}</div>
              <div class="book-title-spine">${book.title}</div>
            </div>
          </div>
          ${book.novella ? '<div class="novella-flag">Novella</div>' : ''}
          ${hasBm ? '<div class="bookmark-dot"></div>' : ''}
        </div>
        <div class="book-meta">
          <div class="book-meta-name">${book.title}</div>
          <div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div>
        </div>`;
    }

    const img = card.querySelector('.cover-img');
    if (img) {
      img.addEventListener('error', () => { img.style.display='none'; });
      img.addEventListener('load',  () => { if(img.naturalWidth<=1) img.style.display='none'; });
    }

    card.addEventListener('click', () => openBook(book.id));
    let pt;
    card.addEventListener('touchstart', () => {
      pt = setTimeout(() => { const r=card.getBoundingClientRect(); showCtx({clientX:r.left+r.width/2, clientY:r.top+60}, book.id); }, 480);
    }, {passive:true});
    card.addEventListener('touchend',  () => clearTimeout(pt), {passive:true});
    card.addEventListener('touchmove', () => clearTimeout(pt), {passive:true});
    card.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, book.id); });
    grid.appendChild(card);
  });

  // lazy inject covers if script already loaded

  if (!covers) {
    const s = document.createElement('script');
    s.src = currentSeries.coversFile;
    s.onload = () => renderLibrary();
    document.head.appendChild(s);
  }
}

async function openBook(id, jumpTo) {
  const book = currentSeries.catalogue.find(b => b.id === id);
  if (!book) return;
  currentBook = book;
  applyTintAll();
  showView('view-reader');
  document.getElementById('reader-title').textContent = `${book.num}. ${book.title}`;
  showLoading(`Loading ${book.title}…`);
  try {
    const bytes = await loadBookData(id);
    showLoading('Rendering…');
    await loadPDF(book, bytes, jumpTo);
  } catch(err) {
    hideLoading(); toast('Error: ' + (err.message || 'could not open')); return;
  }
  hideLoading();
}

// ─── LOAD BOOK DATA ───────────────────────────────────────────────
// Cache stores the base64 string, NOT the Uint8Array.
// pdfDoc.destroy() detaches the ArrayBuffer it was given, so if we cached
// the Uint8Array directly, reopening the same book would crash with
// "ArrayBuffer at index 0 is already detached". Storing base64 and
// creating a fresh Uint8Array each open avoids this entirely.
async function loadBookData(id) {
  const cacheKey = currentSeries.id + '_' + id;

  if (!pdfCache[cacheKey]) {
    if (!window.BOOK_DATA) window.BOOK_DATA = {};
    const resp = await fetch(`${currentSeries.bookFolder}/${id}.js`);
    if (!resp.ok) throw new Error(`Could not load ${currentSeries.bookFolder}/${id}.js (${resp.status})`);
    const text = await resp.text();
    const match = text.match(/window\.BOOK_DATA\['\d+'\]='([A-Za-z0-9+/=]+)';/);
    if (!match) throw new Error(`Could not parse book ${id}`);
    pdfCache[cacheKey] = match[1]; // store raw base64 string
  }

  // Always decode fresh so pdfDoc.destroy() can't detach the cached copy
  const bin = atob(pdfCache[cacheKey]);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// ─── PDF + THREE-SLOT PAGE SYSTEM ─────────────────────────────────
// Three slots stay alive permanently. After a swipe we ROTATE which slot
// is cur/next/prev rather than re-rendering — that's what makes it smooth.
// Only the newly exposed slot (the one that is now "far away") gets a fresh
// render queued in the background, so the user never sees a repaint flash.

async function loadPDF(book, bytes, jumpToPage) {
  pdfDoc = await pdfjsLib.getDocument({data: bytes}).promise;
  totalPages = pdfDoc.numPages;
  state.totals[book.id] = totalPages; saveState();
  const start = jumpToPage != null ? jumpToPage : (state.progress[book.id] || 1);
  await initSlots(start);
}

// Slot elements — fixed, never removed
const S = {};
function slot(name) {
  if (!S[name]) {
    const el = document.createElement('div');
    el.className = 'page-slot';
    const nav = document.getElementById('reader-nav');
    document.getElementById('reader-content').insertBefore(el, nav);
    S[name] = el;
  }
  return S[name];
}

// Place slots instantly (no animation)
// next = below (+100%), prev = above (-100%)
// swipe up = next page, swipe down = prev page
function placeSlots() {
  slot('cur') .style.cssText = 'transition:none;transform:translateY(0)';
  slot('next').style.cssText = 'transition:none;transform:translateY(100%)';
  slot('prev').style.cssText = 'transition:none;transform:translateY(-100%)';
}

// Render one PDF page into a slot element
async function renderIntoSlot(el, pageNum) {
  el.innerHTML = '';
  if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return;
  const page = await pdfDoc.getPage(pageNum);
  const vp0  = page.getViewport({scale: 1});
  const rc   = document.getElementById('reader-content');
  const dpr  = window.devicePixelRatio || 1;
  const scale = Math.min(rc.clientWidth / vp0.width, rc.clientHeight / vp0.height) * dpr;
  const vp   = page.getViewport({scale});
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  canvas.style.width  = Math.round(vp.width  / dpr) + 'px';
  canvas.style.height = Math.round(vp.height / dpr) + 'px';
  canvas.className = tintClass();
  // Pre-fill with transparent so the parent's page-bg shows through uniformly
  // under the tint filter — no white flash between pages
  const ctx2d = canvas.getContext('2d');
  ctx2d.fillStyle = '#fff';
  ctx2d.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({canvasContext: ctx2d, viewport: vp}).promise;
  el.appendChild(canvas);
  // If lock is on, pre-stamp the current zoom onto this canvas immediately
  // so it never flashes at zoom=1 when it becomes the active slot
  if (scrollLockOn && (zoomLevel !== 1 || panOffsetX !== 0 || panOffsetY !== 0)) {
    canvas.style.transformOrigin = '50% 50%';
    canvas.style.transform = `translate(${panOffsetX}px, 0px) scale(${zoomLevel})`;
    // Note: panOffsetY is reset to 0 per page, so new pages always start at top
  }
}

// Called once on book open — render cur + both neighbours, then place
async function initSlots(n) {
  n = Math.max(1, Math.min(n, totalPages));
  currentPage = n;
  await renderIntoSlot(slot('cur'),  n);
  placeSlots();
  updateUI(); saveProgress();
  // neighbours in background
  renderIntoSlot(slot('next'), n + 1);
  renderIntoSlot(slot('prev'), n - 1);
}

// After a swipe completes: rotate slot roles and queue the new far slot
function advanceSlots(direction) {
  ttsStop();
  // direction: +1 = went forward (swiped up), -1 = went back (swiped down)
  if (direction === 1) {
    // next became cur, cur became prev, prev is now the new far next
    const tmp = S.prev;
    S.prev = S.cur;
    S.cur  = S.next;
    S.next = tmp;
    currentPage++;
  } else {
    // prev became cur, cur became next, next is now the new far prev
    const tmp = S.next;
    S.next = S.cur;
    S.cur  = S.prev;
    S.prev = tmp;
    currentPage--;
  }
  // Snap all slots to their new logical positions instantly (no flash)
  // Apply zoom to the new cur canvas BEFORE placeSlots so it never shows at wrong zoom
  if (scrollLockOn) { panOffsetX = 0; panOffsetY = 0; }
  else              { panOffsetX = 0; panOffsetY = 0; zoomLevel = 1; }
  applyTransform(); // stamps zoom onto new cur canvas first
  placeSlots();     // then snap slot positions
  updateUI(); saveProgress();
  // Render the newly-far slot in the background
  if (direction === 1) renderIntoSlot(S.next, currentPage + 1);
  else                 renderIntoSlot(S.prev, currentPage - 1);
}

// Used by the progress bar / prev/next buttons — jump to arbitrary page
async function gotoPage(n) {
  ttsStop();
  n = Math.max(1, Math.min(n, totalPages));
  currentPage = n;
  panOffsetX = 0; panOffsetY = 0;
  if (!scrollLockOn) zoomLevel = 1;
  await renderIntoSlot(slot('cur'), n);
  placeSlots();
  updateUI(); saveProgress();
  renderIntoSlot(slot('next'), n + 1);
  renderIntoSlot(slot('prev'), n - 1);
}

// ─── ZOOM + PAN + SWIPE ───────────────────────────────────────────
// Page flips are VERTICAL only. Always. Swipe up = next, swipe down = prev.
//
// Lock OFF: pinch to zoom. Single finger swipes up/down to flip pages.
//           Zoom resets on page turn.
//
// Lock ON:  pinch BLOCKED — zoom frozen at your preferred level.
//           Vertical drag pans the canvas so you can read all the text.
//           Swipe up/down STILL flips pages — detected from total travel
//           distance since finger-down, NOT the incremental pan delta,
//           so panning never accidentally blocks a page flip.

let navLocked = false;
const SWIPE_MIN = 50;  // total px from finger-down to commit a page flip
const DEADZONE  = 6;   // px before we start tracking

// ── zoom/pan state ────────────────────────────────────────────────
let zoomLevel  = 1;
let panOffsetX = 0;
let panOffsetY = 0;

// ── scroll lock ───────────────────────────────────────────────────
let scrollLockOn = false;

function setScrollLock(on) {
  scrollLockOn = on;
  document.getElementById('lock-icon-off').style.display = on ? 'none'  : 'inline';
  document.getElementById('lock-icon-on') .style.display = on ? 'inline': 'none';
  document.getElementById('scroll-lock-btn').classList.toggle('lock-on', on);
  if (!on) { zoomLevel = 1; panOffsetX = 0; panOffsetY = 0; applyTransform(); }
  toast(on ? 'Lock ON — drag to pan, swipe to flip' : 'Lock OFF — pinch to zoom, swipe to flip');
}

document.getElementById('scroll-lock-btn').addEventListener('click', e => {
  e.stopPropagation();
  setScrollLock(!scrollLockOn);
});

// Apply zoom+pan transform to a specific slot's canvas (defaults to cur)
function applyTransform(targetSlot) {
  const s = targetSlot || slot('cur');
  const canvas = s && s.querySelector('canvas');
  if (!canvas) return;
  if (zoomLevel === 1 && panOffsetX === 0 && panOffsetY === 0) {
    canvas.style.transform = '';
    canvas.style.transformOrigin = '';
  } else {
    canvas.style.transformOrigin = '50% 50%';
    canvas.style.transform = `translate(${panOffsetX}px, ${panOffsetY}px) scale(${zoomLevel})`;
  }
}

function clampPan() {
  const canvas = slot('cur') && slot('cur').querySelector('canvas');
  if (!canvas) return;
  if (zoomLevel <= 1) {
    // At zoom=1 only clamp X to 0 (no horizontal pan at normal zoom)
    // Y pan is allowed in lock mode so do NOT zero it here
    panOffsetX = 0;
    // Clamp Y so you can't pan past the canvas edges
    const maxY = Math.max(0, canvas.offsetHeight - rc.clientHeight);
    panOffsetY = Math.max(-maxY, Math.min(0, panOffsetY));
    return;
  }
  const maxX = Math.max(0, (canvas.offsetWidth  * zoomLevel - rc.clientWidth)  / 2);
  const maxY = Math.max(0, (canvas.offsetHeight * zoomLevel - rc.clientHeight) / 2);
  panOffsetX = Math.max(-maxX, Math.min(maxX, panOffsetX));
  panOffsetY = Math.max(-maxY, Math.min(maxY, panOffsetY));
}

function resetTransform() {
  zoomLevel = 1; panOffsetX = 0; panOffsetY = 0; applyTransform();
}

// ── touch state ───────────────────────────────────────────────────
// ty0/tx0   = finger position at touchstart — NEVER updated mid-drag
//             used to measure total swipe distance for page-flip detection
// tyLast    = finger position last frame — updated every move
//             used only for incremental pan delta in lock mode
let tx0=0, ty0=0, tyLast=0, txLast=0, dragging=false;
let pinching=false, pinchDist0=0, zoomAtPinch=1;

function getTouchDist(e) {
  return Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
}

const rc = document.getElementById('reader-content');

rc.addEventListener('touchstart', e => {
  if (navLocked) return;
  if (e.touches.length === 2) {
    if (scrollLockOn) { e.preventDefault(); return; }
    e.preventDefault();
    pinching = true; dragging = false;
    pinchDist0 = getTouchDist(e); zoomAtPinch = zoomLevel;
    return;
  }
  pinching = false;
  tx0 = txLast = e.touches[0].clientX;
  ty0 = tyLast = e.touches[0].clientY;
  dragging = false;
}, {passive:false});

rc.addEventListener('touchmove', e => {
  if (navLocked) { e.preventDefault(); return; }

  // pinch zoom (lock OFF only)
  if (e.touches.length === 2) {
    if (scrollLockOn) { e.preventDefault(); return; }
    e.preventDefault();
    if (!pinching) return;
    zoomLevel = Math.max(1, Math.min(5, zoomAtPinch * getTouchDist(e) / pinchDist0));
    if (zoomLevel === 1) { panOffsetX = 0; panOffsetY = 0; }
    clampPan(); applyTransform();
    return;
  }
  if (pinching) return;

  const curY = e.touches[0].clientY;
  const curX = e.touches[0].clientX;
  // total distance from finger-down (for flip detection)
  const totalDy = curY - ty0;
  const totalDx = curX - tx0;
  // incremental delta from last frame (for smooth pan)
  const deltaY = curY - tyLast;
  const deltaX = curX - txLast;

  if (!dragging && Math.abs(totalDy) < DEADZONE && Math.abs(totalDx) < DEADZONE) return;

  e.preventDefault();
  dragging = true;
  tyLast = curY; txLast = curX;

  if (scrollLockOn) {
    // Pan canvas vertically — ty0 stays frozen so flip detection still works
    panOffsetY += deltaY;
    clampPan(); applyTransform();
    return;
  }

  if (zoomLevel > 1) {
    // Zoomed in, lock off — pan in any direction
    panOffsetX += deltaX; panOffsetY += deltaY;
    clampPan(); applyTransform();
    return;
  }

  // Normal: drag slots vertically for page-flip preview
  // Use totalDy here so slots follow the full finger position
  slot('cur') .style.cssText = `transition:none;transform:translateY(${totalDy}px)`;
  slot('next').style.cssText = `transition:none;transform:translateY(calc(100% + ${totalDy}px))`;
  slot('prev').style.cssText = `transition:none;transform:translateY(calc(-100% + ${totalDy}px))`;
}, {passive:false});

rc.addEventListener('touchend', e => {
  if (navLocked) return;
  if (pinching && e.touches.length < 2) { pinching = false; return; }
  if (pinching) return;

  const touch = e.changedTouches[0];
  // Total swipe distance from finger-down — unaffected by panning
  const totalDy = touch.clientY - ty0;

  const nav = document.getElementById('reader-nav');
  const nr  = nav.getBoundingClientRect();
  const inNav = touch.clientX >= nr.left && touch.clientX <= nr.right &&
                touch.clientY >= nr.top  && touch.clientY <= nr.bottom;

  if (!dragging) { if (!inNav) toggleImmersive(); return; }
  dragging = false;

  // Zoomed + lock off = we were panning, no page flip
  if (!scrollLockOn && zoomLevel > 1) return;
  // Lock on + vertical pan only = check totalDy for flip
  // (pan was incremental so slots haven't moved, just the canvas)

  const canNext = currentPage < totalPages;
  const canPrev = currentPage > 1;
  const T = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
  const SP = 'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';

  if (totalDy < -SWIPE_MIN && canNext) {
    // Swipe up → next page
    // Pre-apply zoom to incoming slot so it appears at the right zoom from frame 1
    panOffsetX = 0; panOffsetY = 0;
    applyTransform(slot('next'));
    if (scrollLockOn) applyTransform(slot('cur'));
    navLocked = true;
    slot('cur') .style.cssText = `transition:${T};transform:translateY(-100%)`;
    slot('next').style.cssText = `transition:${T};transform:translateY(0)`;
    slot('prev').style.cssText = `transition:none;transform:translateY(-200%)`;
    setTimeout(() => {
      navLocked = false;
      if (!scrollLockOn) resetTransform();
      advanceSlots(+1);
    }, 280);

  } else if (totalDy > SWIPE_MIN && canPrev) {
    // Swipe down → prev page
    panOffsetX = 0; panOffsetY = 0;
    applyTransform(slot('prev'));
    if (scrollLockOn) applyTransform(slot('cur'));
    navLocked = true;
    slot('cur') .style.cssText = `transition:${T};transform:translateY(100%)`;
    slot('prev').style.cssText = `transition:${T};transform:translateY(0)`;
    slot('next').style.cssText = `transition:none;transform:translateY(200%)`;
    setTimeout(() => {
      navLocked = false;
      if (!scrollLockOn) resetTransform();
      advanceSlots(-1);
    }, 280);

  } else if (!scrollLockOn) {
    // Didn't swipe far enough — spring back (only in normal mode; lock mode slots never moved)
    slot('cur') .style.cssText = `transition:${SP};transform:translateY(0)`;
    slot('next').style.cssText = `transition:${SP};transform:translateY(100%)`;
    slot('prev').style.cssText = `transition:${SP};transform:translateY(-100%)`;
  }
}, {passive:true});

rc.addEventListener('touchcancel', () => {
  if (navLocked) return;
  pinching = false; dragging = false;
  const SP = 'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
  slot('cur') .style.cssText = `transition:${SP};transform:translateY(0)`;
  slot('next').style.cssText = `transition:${SP};transform:translateY(100%)`;
  slot('prev').style.cssText = `transition:${SP};transform:translateY(-100%)`;
}, {passive:true});

// ─── IMMERSIVE ────────────────────────────────────────────────────
let immersive = false;
function toggleImmersive() {
  immersive = !immersive;
  document.getElementById('view-reader').classList.toggle('immersive', immersive);
  if (immersive) toast('Tap page to show controls');
}

// ─── READER UI ────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('reader-page-info').textContent = `${currentPage} / ${totalPages}`;
  const p = document.getElementById('reader-progress'); p.max = totalPages; p.value = currentPage;
  const bm = currentBook ? state.bookmarks[currentBook.id] : null;
  const filled = bm === currentPage;
  const path = document.querySelector('#bm-icon path');
  path.setAttribute('fill',   filled ? 'var(--amber)' : 'none');
  path.setAttribute('stroke', filled ? 'var(--amber)' : 'currentColor');
}
function saveProgress() { if (!currentBook) return; state.progress[currentBook.id] = currentPage; saveState(); }

document.getElementById('prev-btn').addEventListener('click', () => { if(currentPage>1) gotoPage(currentPage-1); });
document.getElementById('next-btn').addEventListener('click', () => { if(currentPage<totalPages) gotoPage(currentPage+1); });
document.getElementById('reader-progress').addEventListener('change', e => gotoPage(parseInt(e.target.value)));

document.getElementById('bookmark-btn').addEventListener('click', () => {
  if (!currentBook) return;
  const ex = state.bookmarks[currentBook.id];
  if (ex === currentPage) { delete state.bookmarks[currentBook.id]; toast('Bookmark removed'); }
  else { state.bookmarks[currentBook.id] = currentPage; toast(`Page ${currentPage} bookmarked`); }
  saveState(); updateUI();
});

document.getElementById('back-btn').addEventListener('click', () => {
  saveProgress();
  ttsStop(); closeTTSPanel();
  if (pdfDoc) { try { pdfDoc.destroy(); } catch(e) {} pdfDoc = null; }
  ['cur','prev','next'].forEach(n => { if(S[n]) S[n].innerHTML=''; });
  currentBook = null; immersive = false; navLocked = false; scrollLockOn = false;
  zoomLevel = 1; panOffsetX = 0; panOffsetY = 0;
  document.getElementById('lock-icon-off').style.display = 'inline';
  document.getElementById('lock-icon-on') .style.display = 'none';
  document.getElementById('scroll-lock-btn').classList.remove('lock-on');
  document.getElementById('view-reader').classList.remove('immersive');
  showView('view-library');
  renderLibrary();
});

// ─── TTS ──────────────────────────────────────────────────────────
let ttsSpeaking = false;
let ttsPaused   = false;
let ttsVoices   = [];
let ttsVoiceIdx = 0;
let ttsRate     = 1.0;
let _ttsUtt     = null;

async function ttsGetPageText(pageNum) {
  if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return '';
  try {
    const page    = await pdfDoc.getPage(pageNum);
    const content = await page.getTextContent();
    return content.items.map(i => i.str).join(' ').replace(/\s+/g, ' ').trim();
  } catch(e) { return ''; }
}

function ttsUpdatePlayState() {
  const label   = document.getElementById('tts-play-label');
  const icon    = document.getElementById('tts-play-icon');
  const anim    = document.getElementById('tts-anim');
  const playBtn = document.getElementById('tts-play-btn');
  const topBtn  = document.getElementById('tts-btn');
  if (!label || !icon || !anim || !playBtn || !topBtn) return;

  if (ttsSpeaking && !ttsPaused) {
    playBtn.classList.add('playing');
    label.textContent = 'Pause';
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
    anim.classList.add('on');
    topBtn.style.color = 'var(--amber)';
  } else if (ttsPaused) {
    playBtn.classList.add('playing');
    label.textContent = 'Resume';
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    anim.classList.remove('on');
    topBtn.style.color = 'var(--amber)';
  } else {
    playBtn.classList.remove('playing');
    label.textContent = 'Play Page';
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    anim.classList.remove('on');
    topBtn.style.color = '';
  }
}

async function ttsPlayPause() {
  if (ttsSpeaking && !ttsPaused) {
    window.speechSynthesis.pause();
    ttsPaused = true;
    ttsUpdatePlayState();
    return;
  }
  if (ttsPaused) {
    window.speechSynthesis.resume();
    ttsPaused = false;
    ttsUpdatePlayState();
    return;
  }
  const text = await ttsGetPageText(currentPage);
  if (!text) { toast('No readable text on this page'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (ttsVoices[ttsVoiceIdx]) utt.voice = ttsVoices[ttsVoiceIdx];
  utt.rate  = ttsRate;
  utt.onstart  = () => { ttsSpeaking = true;  ttsPaused = false; ttsUpdatePlayState(); };
  utt.onend    = () => { ttsSpeaking = false; ttsPaused = false; ttsUpdatePlayState(); };
  utt.onerror  = () => { ttsSpeaking = false; ttsPaused = false; ttsUpdatePlayState(); };
  utt.onpause  = () => { ttsPaused = true;  ttsUpdatePlayState(); };
  utt.onresume = () => { ttsPaused = false; ttsUpdatePlayState(); };
  _ttsUtt = utt;
  ttsSpeaking = true; ttsPaused = false;
  ttsUpdatePlayState();
  window.speechSynthesis.speak(utt);
}

function ttsStop() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _ttsUtt = null;
  ttsSpeaking = false; ttsPaused = false;
  ttsUpdatePlayState();
}

function buildVoicePicker() {
  const list = document.getElementById('tts-voice-list');
  if (!list) return;
  list.innerHTML = '';
  if (!ttsVoices.length) {
    list.innerHTML = '<p style="font-size:.75rem;color:var(--text-dim);padding:8px 4px">No voices available on this device</p>';
    return;
  }
  ttsVoices.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'tts-voice-btn' + (i === ttsVoiceIdx ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span>${v.name}</span><span class="tts-voice-lang">${v.lang}</span>`;
    btn.addEventListener('click', () => {
      ttsVoiceIdx = i;
      document.querySelectorAll('.tts-voice-btn').forEach(b =>
        b.classList.toggle('active', +b.dataset.idx === i));
      // Restart with new voice if currently speaking
      if (ttsSpeaking || ttsPaused) { ttsStop(); ttsPlayPause(); }
    });
    list.appendChild(btn);
  });
}

function loadTTSVoices() {
  const all = window.speechSynthesis.getVoices();
  if (!all.length) return; // not ready yet; voiceschanged will fire
  const en  = all.filter(v => v.lang.startsWith('en'));
  ttsVoices = en.length ? en : all;
  // Prefer first local (offline) voice
  const localIdx = ttsVoices.findIndex(v => v.localService);
  if (localIdx !== -1 && ttsVoiceIdx === 0) ttsVoiceIdx = localIdx;
  buildVoicePicker();
}

if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', loadTTSVoices);
  loadTTSVoices();
}

document.getElementById('tts-rate').addEventListener('input', e => {
  ttsRate = parseFloat(e.target.value);
  document.getElementById('tts-rate-val').textContent = ttsRate + '×';
});

// Topbar TTS button: open panel if idle; toggle play/pause if active
document.getElementById('tts-btn').addEventListener('click', async () => {
  if (ttsSpeaking || ttsPaused) {
    await ttsPlayPause();
  } else {
    document.getElementById('tts-panel').classList.add('open');
    document.getElementById('tts-overlay').classList.add('open');
  }
});

document.getElementById('tts-overlay').addEventListener('click', closeTTSPanel);

function closeTTSPanel() {
  document.getElementById('tts-panel').classList.remove('open');
  document.getElementById('tts-overlay').classList.remove('open');
}

document.getElementById('tts-play-btn').addEventListener('click', ttsPlayPause);
document.getElementById('tts-stop-btn').addEventListener('click', ttsStop);

// ─── TINT ─────────────────────────────────────────────────────────
// Background colours that match each tint so the area around the canvas
// (including the gap left by the sliding topbar in immersive mode) always
// looks like the page, not a random grey or black.
function tintClass() { return (TINTS.find(t => t.id === currentTint) || TINTS[0]).cls; }
function applyTintAll() {
  const cls = tintClass();
  // Remove all tint classes from the html element
  TINTS.forEach(t => { if (t.cls) document.documentElement.classList.remove(t.cls); });
  // Add the active tint class to html so `.tint-X #reader-content` CSS selectors fire
  if (cls) document.documentElement.classList.add(cls);
  // Keep canvas class for any canvas-level fallback
  document.querySelectorAll('.page-slot canvas').forEach(c => { c.className = cls; });
}
function buildTintPicker() {
  const grid = document.getElementById('tint-grid');
  TINTS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tint-btn' + (t.id === currentTint ? ' active' : '');
    btn.dataset.id = t.id;
    btn.innerHTML = `<span class="tint-swatch" style="background:${t.swatch}"></span>${t.label}`;
    btn.addEventListener('click', () => {
      currentTint = t.id;
      if (currentSeries) localStorage.setItem(currentSeries.tintKey, t.id);
      document.querySelectorAll('.tint-btn').forEach(b => b.classList.toggle('active', b.dataset.id === t.id));
      applyTintAll();
      closeTintPanel();
    });
    grid.appendChild(btn);
  });
}
document.getElementById('tint-btn').addEventListener('click', () => {
  document.getElementById('tint-panel').classList.add('open');
  document.getElementById('tint-overlay').classList.add('open');
});
document.getElementById('tint-overlay').addEventListener('click', closeTintPanel);
function closeTintPanel() {
  document.getElementById('tint-panel').classList.remove('open');
  document.getElementById('tint-overlay').classList.remove('open');
}

// ─── VIEW HELPERS ─────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const inReader = id === 'view-reader';
  const inSeries = id === 'view-series';
  document.getElementById('topbar').style.display = inReader ? 'none' : 'flex';
  document.getElementById('sort-btn').style.display = (inSeries || inReader) ? 'none' : 'flex';
  if (inSeries) {
    document.getElementById('topbar-title').textContent = 'MY LIBRARY';
    document.getElementById('topbar-sub').textContent  = '';
  }
}
function showLoading(m) { document.getElementById('loading-label').textContent=m; document.getElementById('loading').classList.remove('hidden'); }
function hideLoading()  { document.getElementById('loading').classList.add('hidden'); }
let toastT;
function toast(m) { const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),3000); }

// ─── BACK NAVIGATION ──────────────────────────────────────────────
// In reader → back to library; in library → back to series home
window.addEventListener('popstate', () => {
  const readerActive = document.getElementById('view-reader').classList.contains('active');
  const libraryActive = document.getElementById('view-library').classList.contains('active');
  if (readerActive) document.getElementById('back-btn').click();
  else if (libraryActive) { buildSeriesHome(); showView('view-series'); }
});

// Also make the topbar logo clickable to go back to series home from library
document.getElementById('topbar-logo').addEventListener('click', () => {
  if (document.getElementById('view-library').classList.contains('active')) {
    buildSeriesHome();
    showView('view-series');
  }
});

// ─── INIT ─────────────────────────────────────────────────────────
buildTintPicker();
buildSeriesHome();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
